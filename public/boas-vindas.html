<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bem-vindo — Peniel Mídia</title>
  <link rel="icon" href="/docs/Foguinho%20vazado.png" type="image/png"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0c0e11;
      color: #e8eaed;
      min-height: 100vh;
      padding: 1.5rem;
      line-height: 1.55;
      font-size: 0.95rem;
    }
    .wrap { max-width: 26rem; margin: 0 auto; }
    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #e8eaed;
    }
    p { color: #8d96a3; margin-bottom: 0.65rem; }
    p:last-of-type { margin-bottom: 1.25rem; }
    a.btn {
      display: inline-block;
      background: #c94a52;
      color: #fff;
      text-decoration: none;
      padding: 0.55rem 1rem;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 500;
    }
    a.btn:hover { background: #a63d44; }
    .logo {
      max-width: 140px;
      filter: brightness(0) invert(1);
      opacity: 0.9;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="/docs/LOGO OFICIAL.png" alt="Peniel"/>
    <h1>Bem-vindo ao Peniel Mídia</h1>
    <p>Gestão de escalas, comunicações e equipe em um só lugar.</p>
    <p>Entre com o e-mail cadastrado pela liderança ou com a conta que você criou no primeiro acesso.</p>
    <a class="btn" href="/">Ir para o sistema</a>
  </div>
</body>
</html>
